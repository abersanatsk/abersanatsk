<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaman Aber Sanat Gücü</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #FFFFFF; /* Beyaz Zemin */
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Oswald', sans-serif;
        }
        .main-title {
            color: #000000; /* Siyah Yazı */
            line-height: 0.9;
        }
        .sub-title {
            color: #E30613; /* Kırmızı Yazı */
            letter-spacing: 0.2em;
        }
    </style>
</head>
<body>

    <div class="text-center p-4">
        <h1 class="main-title text-5xl md:text-8xl font-black uppercase italic mb-4">
            KARAMAN <br> ABER SANAT GÜCÜ
        </h1>

        <h2 class="sub-title text-2xl md:text-4xl font-bold uppercase italic mt-6">
            İNANÇ KANATLANDIRIR
        </h2>

        <div class="mt-20 opacity-20 text-[10px] text-black font-bold tracking-[0.5em] uppercase">
            RIDVAN ARSLAN
        </div>
    </div>

</body>
</html>
