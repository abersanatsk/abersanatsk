<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaman Aber Sanat Gücü Spor Kulübü</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Syne:wght@500;700;800&family=Inter:wght@400;700&family=Montserrat:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    
    <style id="theme-styles">
        :root {
            /* Varsayılan Ayarlar */
            --bg-main: #070707; 
            --bg-card: #111111; 
            --text-main: #ffffff; 
            --text-muted: #a1a1aa; 
            --accent-color: #e60000; 
            --border-color: rgba(255, 255, 255, 0.08);
            --header-bg: rgba(7, 7, 7, 0.85);
            
            /* Kontrol Edilebilir Değişkenler */
            --logo-size: 65px; 
            --hero-align: center;
            
            --font-main: 'Syne', sans-serif;
            --font-sport: 'Space Grotesk', sans-serif;
            --hero-title-size: 8.5rem;
            --section-title-size: 3rem;
            --card-radius: 24px;
            --border-style: 1px solid var(--border-color);
            --card-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
    </style>

    <style>
        /* Logo Boyut ve Hizalama Entegrasyonu */
        .logo-img-wrapper { height: var(--logo-size); min-width: var(--logo-size); display: none; align-items: center; justify-content: center; }
        .hero { text-align: var(--hero-align); }
        .hero-slogan-monument { text-align: var(--hero-align); }

        /* Temel Yapı */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: var(--font-main); overflow-x: hidden; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 3rem; }

        header { position: fixed; top: 0; left: 0; width: 100%; z-index: 100; background: var(--header-bg); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); }
        nav { display: flex; justify-content: space-between; align-items: center; min-height: 100px; }
        
        .logo-container { text-decoration: none; color: var(--text-main); display: flex; align-items: center; gap: 20px; }
        .logo-img-wrapper img { max-height: 100%; width: auto; object-fit: contain; }
        
        .nav-links { display: flex; list-style: none; gap: 1.8rem; }
        .nav-links a { text-decoration: none; color: var(--text-main); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; }
        .nav-links a:hover { opacity: 1; color: var(--accent-color); }

        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 12rem 2rem 6rem 2rem; position: relative; }
        .hero-bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover !important; filter: brightness(0.35); z-index: 1; }
        .hero-content-wrapper { position: relative; z-index: 2; max-width: 1100px; width: 100%; }
        
        .hero-title-sculpture { font-family: var(--font-sport); font-size: var(--hero-title-size); font-weight: 700; text-transform: uppercase; line-height: 0.9; margin-bottom: 3rem; color: #ffffff; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hero-slogan-monument { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); padding: 3.5rem; border-radius: var(--card-radius); display: inline-block; }
        
        /* Admin Modal */
        .admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0, 0.95); z-index: 1000; overflow-y: auto; }
        .admin-content { background-color: #0c0f17; border-radius: 30px; width: 95%; max-width: 1200px; margin: 50px auto; padding: 3rem; color: white; border: 1px solid #333; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; }
        .form-control { width: 100%; padding: 1rem; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; margin-bottom: 1rem; }
        .submit-btn { padding: 1rem 2rem; background: var(--accent-color); color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <nav>
                <a href="#" class="logo-container">
                    <div class="logo-img-wrapper" id="header-logo-wrapper" style="display:flex;"><img src="" id="header-logo-img"></div>
                    <div>
                        <div class="logo-text-top" id="header-club-title">KARAMAN ABER SANAT GÜCÜ</div>
                        <div class="logo-text-sub">SPOR KULÜBÜ</div>
                    </div>
                </a>
                <ul class="nav-links">
                    <li><a href="#yonetim-kurulu">Yönetim</a></li>
                    <li><a href="#iletisim">İletişim</a></li>
                    <li><a href="#" onclick="toggleAdminModal()">Yönetim Paneli</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero" id="home">
        <div class="hero-bg-canvas" id="hero-bg-overlay"></div>
        <div class="hero-content-wrapper">
            <h1 class="hero-title-sculpture" id="hero-title-text">İNANÇ<br><span>MÜZESİ</span></h1>
            <div class="hero-slogan-monument">
                <div class="monument-badge">İNANÇ KANATLANDIRIR</div>
                <div class="monument-text" id="hero-slogan-text">Sloganımız olan 'İNANÇ KANATLANDIRIR' ilkesinden aldığımız güçle Karaman futboluna yeni bir soluk getiriyoruz.</div>
            </div>
        </div>
    </section>

    <!-- ADMIN MODAL -->
    <div class="admin-modal" id="adminModal">
        <div class="admin-content">
            <span style="float:right; cursor:pointer; font-size:2rem;" onclick="toggleAdminModal()">&times;</span>
            <h2>Yönetim Paneli</h2>
            <div class="admin-grid" style="margin-top:2rem;">
                <!-- Yerleşim & Hizalama -->
                <div style="background:#111; padding:2rem; border-radius:15px;">
                    <h3>Yerleşim & Hizalama</h3>
                    <div class="form-group" style="margin-top:1rem;">
                        <label>Logo Boyutu (px): <span id="logo-size-val">65</span></label>
                        <input type="range" min="30" max="250" value="65" class="form-control" oninput="updateLogoSize(this.value)">
                    </div>
                    <div class="form-group">
                        <label>Hero Metin Hizalama</label>
                        <select class="form-control" onchange="updateHeroAlign(this.value)">
                            <option value="left">Sola Yaslı</option>
                            <option value="center" selected>Ortalı</option>
                            <option value="right">Sağa Yaslı</option>
                        </select>
                    </div>
                    <button class="submit-btn" onclick="saveLayoutSettings()">Ayarları Kaydet</button>
                </div>

                <!-- Genel Ayarlar -->
                <div style="background:#111; padding:2rem; border-radius:15px;">
                    <h3>Genel Medya</h3>
                    <label>Logo Yükle</label>
                    <input type="file" class="form-control" onchange="uploadImage(this, 'logoUrl')">
                    <label>Arka Plan Yükle</label>
                    <input type="file" class="form-control" onchange="uploadImage(this, 'heroBgUrl')">
                    <button class="submit-btn" style="background:#444;" onclick="saveAllSettings()">Tümünü Kaydet</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let activeData = JSON.parse(localStorage.getItem('aber_sk_data') || JSON.stringify({
            logoSize: "65px", heroAlign: "center", logoUrl: "", heroBgUrl: ""
        }));

        function toggleAdminModal() { const m = document.getElementById('adminModal'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        
        function updateLogoSize(val) { 
            activeData.logoSize = val + 'px'; 
            document.documentElement.style.setProperty('--logo-size', activeData.logoSize);
            document.getElementById('logo-size-val').innerText = val;
        }

        function updateHeroAlign(val) {
            activeData.heroAlign = val;
            document.documentElement.style.setProperty('--hero-align', val);
        }

        function saveLayoutSettings() {
            saveAllSettings();
            alert("Yerleşim ayarları kaydedildi!");
        }

        function saveAllSettings() {
            localStorage.setItem('aber_sk_data', JSON.stringify(activeData));
            location.reload();
        }

        function uploadImage(input, field) {
            const reader = new FileReader();
            reader.onload = (e) => {
                activeData[field] = e.target.result;
                saveAllSettings();
            };
            reader.readAsDataURL(input.files[0]);
        }

        function init() {
            document.documentElement.style.setProperty('--logo-size', activeData.logoSize);
            document.documentElement.style.setProperty('--hero-align', activeData.heroAlign);
            if(activeData.logoUrl) document.getElementById('header-logo-img').src = activeData.logoUrl;
            if(activeData.heroBgUrl) document.getElementById('hero-bg-overlay').style.backgroundImage = `url(${activeData.heroBgUrl})`;
        }

        init();
    </script>
</body>
</html>
