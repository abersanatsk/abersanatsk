<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaman Aber Sanat Gücü</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #030303; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow: hidden; /* Sayfada kaydırma olmaması için */
        }
        .oswald { font-family: 'Oswald', sans-serif; }
        .red-gradient { background: linear-gradient(90deg, #E30613 0%, #90040C 100%); }
        
        /* Logo ve Parlama Efektleri */
        .logo-glow {
            filter: drop-shadow(0 0 50px rgba(227, 6, 19, 0.5)); /* Logonun arkasındaki parıltı */
            animation: pulse-logo 5s infinite ease-in-out;
        }

        @keyframes pulse-logo {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.03); opacity: 0.95; }
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
    
    <img src="logo.png" alt="" class="absolute inset-0 w-full h-full object-contain opacity-[0.03] scale-150 z-0 pointer-events-none grayscale">

    <div class="flex flex-col items-center justify-center relative z-10 text-center">
        
        <div class="absolute w-[700px] h-[700px] bg-red-600/10 rounded-full blur-[200px] -z-10"></div>
        
        <div class="relative z-10 mb-12 transform hover:scale-105 transition duration-700 ease-out">
            <img src="logo.png" alt="Aber Sanat SK Devasa Logo" 
                 class="w-80 h-80 md:w-[600px] md:h-[600px] object-contain relative z-10 logo-glow">
        </div>

        <div class="relative z-10">
            <p class="text-red-600 font-bold tracking-[0.6em] mb-6 text-xs uppercase opacity-80">Karaman Aber Sanat Gücü</p>
            <h1 class="text-6xl md:text-9xl font-black italic oswald uppercase leading-[0.85] tracking-tighter mb-16">
                İNANÇ <br><span class="text-red-600">KANATLANDIRIR</span>
            </h1>
            
            <button class="red-gradient px-12 py-5 font-black uppercase italic tracking-widest hover:scale-105 transition-transform shadow-2xl shadow-red-900/40 text-sm">BİZE KATIL</button>
        </div>
    </div>

    <footer class="absolute bottom-10 left-0 w-full text-center z-20">
        <h2 class="text-4xl font-black italic oswald uppercase mb-1 tracking-tighter text-white/90">RIDVAN ARSLAN</h2>
        <p class="text-[10px] tracking-[0.5em] text-gray-700 uppercase font-bold">© 2026 TÜM HAKLARI SAKLIDIR</p>
        <p class="text-[9px] text-gray-800 tracking-[0.2em] italic uppercase font-medium mt-3">Designed by Rıdvan Arslan</p>
    </footer>

</body>
</html>
